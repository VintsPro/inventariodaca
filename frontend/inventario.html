<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <!-- =========================
         INVENTARIO
    ========================== -->
    <section id="inventario" class="section">
      <div class="section-title">
        <h2>Control de Inventario</h2>
      </div>

      <div class="card form-card">
        <h3>Filtros / Registro de Inventario</h3>
        <form class="form-grid">
          <div class="form-group">
            <label>Producto</label>
            <select>
              <option>Seleccionar producto</option>
            </select>
          </div>

          <div class="form-group">
            <label>Ubicación</label>
            <select>
              <option>Seleccionar ubicación</option>
            </select>
          </div>

          <div class="form-group">
            <label>Cantidad</label>
            <input type="number" placeholder="Ej: 15" />
          </div>
        </form>

        <div class="form-actions">
          <button class="btn btn-save">Guardar</button>
          <button class="btn btn-filter">Filtrar</button>
        </div>
      </div>

      <div class="card">
        <h3>Listado de Inventario</h3>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Producto</th>
                <th>Ubicación</th>
                <th>Cantidad disponible</th>
                <th>Estado de stock</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Teclado Mecánico</td>
                <td>Bodega A</td>
                <td>25</td>
                <td><span class="badge badge-success">Normal</span></td>
              </tr>
              <tr>
                <td>Mouse Inalámbrico</td>
                <td>Bodega B</td>
                <td>7</td>
                <td><span class="badge badge-warning">Bajo</span></td>
              </tr>
              <tr>
                <td>Monitor 24"</td>
                <td>Estante 2</td>
                <td>3</td>
                <td><span class="badge badge-danger">Crítico</span></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
</body>
</html>
