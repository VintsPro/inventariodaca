<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ubicaciones</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- =========================
         UBICACIONES
    ========================== -->
    <section id="ubicaciones" class="section">
      <div class="section-title">
        <h2>Gestión de Ubicaciones</h2>
      </div>

      <div class="card form-card">
        <h3>Registrar Ubicación</h3>
        <form class="form-grid">
          <div class="form-group">
            <label>Nombre de ubicación</label>
            <input type="text" placeholder="Ej: Bodega Principal" />
          </div>
        </form>

        <div class="form-actions">
          <button class="btn btn-save">Guardar</button>
        </div>
      </div>

      <div class="card">
        <h3>Listado de Ubicaciones</h3>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre de ubicación</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>1</td>
                <td>Bodega Principal</td>
                <td class="actions">
                  <button class="btn btn-edit">Editar</button>
                  <button class="btn btn-delete">Eliminar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
</body>
</html>
