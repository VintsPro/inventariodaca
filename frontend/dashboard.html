    <style>
      /* Estilo básico para que el iframe ocupe todo el espacio */
      .main-content {
        padding: 0; /* Quitamos padding para que el iframe llene el espacio */
        overflow: hidden;
      }
      iframe {
        width: 100%;
        height: calc(100vh - 70px); /* Ajusta restando la altura de tu topbar */
        border: none;
      }

      /* Dale flexibilidad al iframe */
      iframe {
        flex-grow: 1; /* Esto hace que el iframe "empuje" hasta el fondo */
        width: 100%;
        border: none;
        border-radius: var(
          --radius
        ); /* Para que mantenga la estética de tus tarjetas */
        background: transparent;
      }
    </style>
