<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Personas - Inventario DACA</title>
    <link rel="stylesheet" href="style.css"> 
    
    <style>
        /* Ajuste para que se vea bien dentro del iframe */
        body {
            background-color: #f4f7fe; /* Color de fondo del dashboard */
            padding: 20px;
            margin: 0;
        }
        .section {
            display: block !important; /* Asegura que sea visible */
        }
    </style>
</head>
<body>

    <section id="personas" class="section">
      <div class="section-title">
        <h2>Gestión de Personas</h2>
      </div>

      <div class="card form-card" style="margin-bottom: 2rem;">
        <h3>Registrar Persona</h3>
        <form class="form-grid">
          <div class="form-group">
            <label>Número de documento</label>
            <input type="text" placeholder="Ej: 123456789" />
          </div>

          <div class="form-group">
            <label>Nombre completo</label>
            <input type="text" placeholder="Ej: Juan Pérez" />
          </div>

          <div class="form-group">
            <label>Teléfono</label>
            <input type="text" placeholder="Ej: 3001234567" />
          </div>

          <div class="form-group">
            <label>Correo</label>
            <input type="email" placeholder="Ej: correo@ejemplo.com" />
          </div>

          <div class="form-group">
            <label>Estado</label>
            <select>
              <option>Activo</option>
              <option>Inactivo</option>
            </select>
          </div>
        </form>

        <div class="form-actions" style="margin-top: 20px; display: flex; gap: 10px;">
          <button class="btn btn-save">Guardar</button>
          <button class="btn btn-edit">Editar</button>
          <button class="btn btn-delete">Eliminar</button>
        </div>
      </div>

      <div class="card">
        <h3>Listado de Personas</h3>
        <div class="table-responsive">
          <table>
            <thead>
              <tr>
                <th>Documento</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>123456789</td>
                <td>Juan Pérez</td>
                <td>3001234567</td>
                <td>juan@email.com</td>
                <td><span class="badge badge-success">Activo</span></td>
                <td class="actions">
                  <button class="btn btn-edit">Editar</button>
                  <button class="btn btn-delete">Eliminar</button>
                </td>
              </tr>
              <tr>
                <td>987654321</td>
                <td>Laura Gómez</td>
                <td>3019876543</td>
                <td>laura@email.com</td>
                <td><span class="badge badge-danger">Inactivo</span></td>
                <td class="actions">
                  <button class="btn btn-edit">Editar</button>
                  <button class="btn btn-delete">Eliminar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

</body>
</html>
