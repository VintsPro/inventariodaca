<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario DACA – Iniciar Sesión</title>
    <link rel="stylesheet" href="style_login.css" />
  </head>
  <body>
    <!-- Encabezado del sistema -->
    <div class="brand">
      <span class="brand-icon">📦</span>
      <h1>Inventario DACA</h1>
      <p>Sistema de registro y control de inventario</p>
    </div>
    
    <!-- Tarjeta principal del login -->
    <div class="card">
      <h2>Iniciar Sesión</h2>
      <p class="sub">Ingresa tus credenciales para acceder al sistema</p>

      <!-- Contenedor para mostrar mensajes (error o éxito) -->
      <div class="msg" id="msg"></div>

      <!-- Barra para mostrar intentos -->
      <div class="intentos-bar" id="intentos-bar"></div>

      <!-- Campo de usuario -->
      <div class="form-group">
        <label for="usuario">Usuario o Correo</label>
        <div class="input-wrap">
          <span class="ico">✉️</span>
          <input
            type="text"
            id="usuario"
            placeholder="Ingresa tu usuario o correo"
          />
        </div>
      </div>

      <!-- Campo de contraseña -->
      <div class="form-group">
        <label for="pass">Contraseña</label>
        <div class="input-wrap">
          <span class="ico">🔒</span>
          <input
            type="password"
            id="pass"
            placeholder="Ingresa tu contraseña"
          />
        </div>
      </div>

      <!-- Opciones adicionales -->
      <div class="extras">

      <!-- Checkbox para recordar usuario -->
        <label><input type="checkbox" id="recordar" /> Recordarme</label>

      <!-- Enlace para recuperar contraseña -->
        <a href="recuperar_usuario.html">¿Olvidaste tu contraseña?</a>
      </div>

      <!-- Botón que ejecuta la función de login -->  
      <button class="btn" id="btnLogin" onclick="intentarLogin()">
        Iniciar Sesión
      </button>

      <!-- Aviso de seguridad -->
      <p class="notice">🔒 Acceso restringido solo para usuarios autorizados</p>
    </div>

    <p class="footer">© 2026 Inventario DACA. Todos los derechos reservados.</p>

    <script>

      // Usuario y contraseña correctos (simulación)
      const USUARIO_CORRECTO = "admin";
      const PASSWORD_CORRECTA = "admin";

      // Número máximo de intentos permitidos
      const MAX_INTENTOS = 3;

      // Contador de intentos fallidos
      let intentos = 0;

      // Función principal que valida el login
      function intentarLogin() {

        // Obtener valores ingresados por el usuario
        const usuario = document.getElementById("usuario").value.trim();
        const pass = document.getElementById("pass").value.trim();

        // Referencias a elementos del DOM  
        const msg = document.getElementById("msg");
        const barLabel = document.getElementById("intentos-bar");
        const btnLogin = document.getElementById("btnLogin");
        const inpUser = document.getElementById("usuario");
        const inpPass = document.getElementById("pass");

        // Limpiar mensajes y estilos anteriores
        msg.className = "msg";
        msg.style.display = "none";
        inpUser.classList.remove("error-input");
        inpPass.classList.remove("error-input");

        // Validar si hay campos vacíos
        if (!usuario || !pass) {
          msg.className = "msg error";
          msg.textContent = "⚠️ Por favor completa todos los campos.";
          if (!usuario) inpUser.classList.add("error-input");
          if (!pass) inpPass.classList.add("error-input");
          return;
        }

        // Validar si las credenciales son correctas
        if (usuario === USUARIO_CORRECTO && pass === PASSWORD_CORRECTA) {

        // Mostrar mensaje de éxito
          msg.className = "msg success";
          msg.textContent = "✅ ¡Bienvenido al sistema! Redirigiendo...";

        // Desactivar botón para evitar múltiples clics
          btnLogin.disabled = true;
          barLabel.style.display = "none";

          // Redirigir al dashboard después de 1.5s
          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1500);
          
        } else {

        // Aumentar contador de intentos
          intentos++;
          inpUser.classList.add("error-input");
          inpPass.classList.add("error-input");
          inpPass.value = "";

        // Validar si superó el número máximo de intentos
          if (intentos >= MAX_INTENTOS) {
            msg.className = "msg error";
            msg.textContent =
              "🚫 Has superado el número máximo de intentos. Acceso bloqueado.";
            btnLogin.disabled = true;
            barLabel.style.display = "none";
            inpUser.disabled = true;
            inpPass.disabled = true;
          } else {

        // Mostrar error y cuántos intentos quedan
            const restantes = MAX_INTENTOS - intentos;
            msg.className = "msg error";
            msg.textContent = "❌ Usuario o contraseña incorrectos.";
            barLabel.style.display = "block";
            barLabel.textContent = `⚠️ Intento ${intentos} de ${MAX_INTENTOS} — te quedan ${restantes} intento${restantes > 1 ? "s" : ""}.`;
          }
        }
      }

        // Permite iniciar sesión presionando la tecla Enter
      document.addEventListener("keydown", function (e) {
        if (e.key === "Enter") intentarLogin();
      });
    </script>
  </body>
</html>
