<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventario DACA – Recuperar Acceso</title>
  <link rel="stylesheet" href="style_login.css">
</head>
<body>

  <!-- TARJETA PRINCIPAL -->
  <div class="card">

  <!-- Icono decorativo --> 
    <div class="lock-circle">🔓</div>

  <!-- Título -->  
    <h2>Recuperar acceso</h2>
    <p class="sub">Ingresa tu correo o usuario para recuperar tu acceso</p>

  <!-- CAMPO DE ENTRADA -->  
    <div class="form-group">
      <label for="correo">Correo o Usuario</label>
      <div class="input-wrap">
  <!-- Icono dentro del input -->      
        <span class="ico">✉️</span>

  <!-- Input -->      
        <input type="text" id="correo" placeholder="Ingresa tu correo o usuario" />
      </div>
    </div>

  <!-- BOTÓN -->  
    <button class="btn">Enviar solicitud</button>

  <!-- Aquí debería enviarse la solicitud de recuperación -->
   
  <!-- LINK PARA VOLVER -->
    <a href="login.html" class="back-link">← Volver al inicio de sesión</a>
  </div>

</body>
</html>
